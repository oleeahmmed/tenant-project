<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accept Invitation | WA Automation</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="min-h-screen flex items-center justify-center bg-[hsl(210,40%,98%)] px-4">
  <div class="w-full max-w-sm">

    {% if invalid %}
    <div class="rounded-xl border border-red-200 bg-white p-8 text-center shadow-sm">
      <div class="inline-flex h-12 w-12 items-center justify-center rounded-full bg-red-100 text-red-600 mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" x2="9" y1="9" y2="15"/><line x1="9" x2="15" y1="9" y2="15"/></svg>
      </div>
      <h1 class="text-lg font-bold text-[hsl(222.2,84%,4.9%)] mb-2">Invalid Invitation</h1>
      <p class="text-sm text-[hsl(215.4,16.3%,46.9%)]">{{ error }}</p>
      <a href="{% url 'login' %}" class="mt-4 inline-block text-sm font-medium text-[hsl(222.2,47.4%,11.2%)] hover:underline">Go to Login</a>
    </div>

    {% else %}
    <div class="mb-6 text-center">
      <span class="inline-flex h-12 w-12 items-center justify-center rounded-full bg-[hsl(222.2,47.4%,11.2%)] text-white mb-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </span>
      <h1 class="text-xl font-bold text-[hsl(222.2,84%,4.9%)]">You're invited!</h1>
      <p class="text-sm text-[hsl(215.4,16.3%,46.9%)] mt-1">Join <strong>{{ invite.tenant.name }}</strong></p>
    </div>

    <div class="rounded-xl border border-[hsl(214.3,31.8%,91.4%)] bg-white p-6 shadow-sm">
      <!-- Invite info -->
      <div class="mb-5 rounded-lg bg-[hsl(210,40%,98%)] border border-[hsl(214.3,31.8%,91.4%)] p-3 space-y-1.5">
        <div class="flex justify-between text-sm">
          <span class="text-[hsl(215.4,16.3%,46.9%)]">Name</span>
          <span class="font-medium text-[hsl(222.2,84%,4.9%)]">{{ invite.name }}</span>
        </div>
        <div class="flex justify-between text-sm">
          <span class="text-[hsl(215.4,16.3%,46.9%)]">Email</span>
          <span class="font-medium text-[hsl(222.2,84%,4.9%)]">{{ invite.email }}</span>
        </div>
        {% if invite.role %}
        <div class="flex justify-between text-sm">
          <span class="text-[hsl(215.4,16.3%,46.9%)]">Role</span>
          <span class="font-medium text-[hsl(222.2,84%,4.9%)]">{{ invite.role.name }}</span>
        </div>
        {% endif %}
      </div>

      {% if error %}
        <div class="mb-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">{{ error }}</div>
      {% endif %}

      <form method="post" action="{% url 'invite_accept' invite.token %}" class="space-y-4">
        {% csrf_token %}
        <div>
          <label class="mb-1.5 block text-sm font-medium text-[hsl(222.2,84%,4.9%)]">Set Password</label>
          <input type="password" name="password" required placeholder="Min 8 characters"
            class="w-full rounded-lg border border-[hsl(214.3,31.8%,91.4%)] bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[hsl(222.2,84%,4.9%)]" />
        </div>
        <button type="submit" class="w-full rounded-lg bg-[hsl(222.2,47.4%,11.2%)] px-4 py-2.5 text-sm font-semibold text-white transition-opacity hover:opacity-90">
          Accept & Join
        </button>
      </form>
    </div>
    {% endif %}
  </div>
</body>
</html>
