<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | WA Automation</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="min-h-screen flex items-center justify-center bg-[hsl(210,40%,98%)] px-4 py-8">
  <div class="w-full max-w-sm">

    <div class="mb-8 text-center">
      <span class="inline-flex h-12 w-12 items-center justify-center rounded-full bg-[hsl(222.2,47.4%,11.2%)] text-white mb-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </span>
      <h1 class="text-xl font-bold text-[hsl(222.2,84%,4.9%)]">Create your account</h1>
      <p class="text-sm text-[hsl(215.4,16.3%,46.9%)] mt-1">Start your free workspace</p>
    </div>

    <div class="rounded-xl border border-[hsl(214.3,31.8%,91.4%)] bg-white p-6 shadow-sm">
      {% if error %}
        <div class="mb-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">{{ error }}</div>
      {% endif %}

      <form method="post" action="{% url 'register' %}" class="space-y-4">
        {% csrf_token %}
        <div>
          <label class="mb-1.5 block text-sm font-medium text-[hsl(222.2,84%,4.9%)]">Full Name</label>
          <input type="text" name="name" required placeholder="Rahim Uddin" value="{{ form_data.name|default:'' }}"
            class="w-full rounded-lg border border-[hsl(214.3,31.8%,91.4%)] bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[hsl(222.2,84%,4.9%)]" />
        </div>
        <div>
          <label class="mb-1.5 block text-sm font-medium text-[hsl(222.2,84%,4.9%)]">Company Name</label>
          <input type="text" name="company_name" required placeholder="Rahim Enterprise" value="{{ form_data.company_name|default:'' }}"
            class="w-full rounded-lg border border-[hsl(214.3,31.8%,91.4%)] bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[hsl(222.2,84%,4.9%)]" />
        </div>
        <div>
          <label class="mb-1.5 block text-sm font-medium text-[hsl(222.2,84%,4.9%)]">Email</label>
          <input type="email" name="email" required placeholder="you@example.com" value="{{ form_data.email|default:'' }}"
            class="w-full rounded-lg border border-[hsl(214.3,31.8%,91.4%)] bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[hsl(222.2,84%,4.9%)]" />
        </div>
        <div>
          <label class="mb-1.5 block text-sm font-medium text-[hsl(222.2,84%,4.9%)]">Password</label>
          <input type="password" name="password" required placeholder="Min 8 characters"
            class="w-full rounded-lg border border-[hsl(214.3,31.8%,91.4%)] bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[hsl(222.2,84%,4.9%)]" />
        </div>
        <button type="submit" class="w-full rounded-lg bg-[hsl(222.2,47.4%,11.2%)] px-4 py-2.5 text-sm font-semibold text-white transition-opacity hover:opacity-90">
          Create Account
        </button>
      </form>
    </div>

    <p class="mt-4 text-center text-sm text-[hsl(215.4,16.3%,46.9%)]">
      Already have an account?
      <a href="{% url 'login' %}" class="font-medium text-[hsl(222.2,47.4%,11.2%)] hover:underline">Sign in</a>
    </p>
  </div>
</body>
</html>
