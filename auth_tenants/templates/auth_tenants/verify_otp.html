<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify OTP | WA Automation</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="min-h-screen flex items-center justify-center bg-[hsl(210,40%,98%)] px-4">
  <div class="w-full max-w-sm">
    <div class="mb-8 text-center">
      <span class="inline-flex h-12 w-12 items-center justify-center rounded-full bg-[hsl(222.2,47.4%,11.2%)] text-white mb-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
      </span>
      <h1 class="text-xl font-bold text-[hsl(222.2,84%,4.9%)]">Check your email</h1>
      <p class="text-sm text-[hsl(215.4,16.3%,46.9%)] mt-1">We sent a 6-digit OTP to <strong>{{ email }}</strong></p>
    </div>

    <div class="rounded-xl border border-[hsl(214.3,31.8%,91.4%)] bg-white p-6 shadow-sm">
      {% if error %}
        <div class="mb-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">{{ error }}</div>
      {% endif %}

      <form method="post" action="{% url 'verify_otp' %}" class="space-y-4">
        {% csrf_token %}
        <input type="hidden" name="email" value="{{ email }}" />
        <div>
          <label class="mb-1.5 block text-sm font-medium text-[hsl(222.2,84%,4.9%)]">OTP Code</label>
          <input type="text" name="otp_code" required maxlength="6" placeholder="123456" autofocus
            class="w-full rounded-lg border border-[hsl(214.3,31.8%,91.4%)] bg-white px-3 py-2.5 text-center text-2xl font-bold tracking-[0.5em] focus:outline-none focus:ring-2 focus:ring-[hsl(222.2,84%,4.9%)]" />
          <p class="mt-1.5 text-xs text-[hsl(215.4,16.3%,46.9%)]">Valid for 10 minutes</p>
        </div>
        <button type="submit" class="w-full rounded-lg bg-[hsl(222.2,47.4%,11.2%)] px-4 py-2.5 text-sm font-semibold text-white transition-opacity hover:opacity-90">
          Verify & Continue
        </button>
      </form>
    </div>
  </div>
</body>
</html>
