{% extends "auth_tenants/base.html" %}
{% block title %}Delete location{% endblock %}
{% block page_title %}HRM · Delete location{% endblock %}

{% block content %}
<div class="mx-auto max-w-md">
  <form method="post" class="simple-card rounded-xl border border-border p-6 shadow-card">
    {% csrf_token %}
    <p class="text-sm">Delete <strong>{{ object.name }}</strong>?</p>
    <div class="mt-4 flex gap-2">
      <button type="submit" class="rounded-lg bg-destructive px-4 py-2 text-sm font-medium text-destructive-foreground">Delete</button>
      <a href="{% url 'hrm:attendance_location_list' %}" class="rounded-lg border border-border px-4 py-2 text-sm">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
