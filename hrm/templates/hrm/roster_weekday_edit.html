{% extends "auth_tenants/base.html" %}
{% block title %}Edit weekly pattern{% endblock %}
{% block page_title %}HRM · Edit weekly pattern{% endblock %}

{% block content %}
<div class="space-y-5">
  <div class="flex items-center gap-3">
    <a href="{% url 'hrm:roster_weekday_list' %}" class="rounded-md p-1.5 text-muted-foreground hover:bg-accent"><i data-lucide="arrow-left" class="h-4 w-4"></i></a>
    <h2 class="text-xl font-bold text-foreground">Edit weekly pattern</h2>
  </div>
  <div class="simple-card max-w-md rounded-xl border border-border p-6 shadow-card">
    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div>
        <label class="mb-1.5 block text-sm font-medium text-foreground">Employee</label>
        {{ form.employee }}
      </div>
      <div>
        <label class="mb-1.5 block text-sm font-medium text-foreground">Weekday</label>
        {{ form.weekday }}
      </div>
      <div>
        <label class="mb-1.5 block text-sm font-medium text-foreground">Shift</label>
        {{ form.shift }}
      </div>
      <div class="flex gap-2 pt-2">
        <button type="submit" class="rounded-lg bg-primary px-4 py-2 text-sm font-medium text-primary-foreground">Save</button>
        <a href="{% url 'hrm:roster_weekday_list' %}" class="rounded-lg border border-border px-4 py-2 text-sm">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
