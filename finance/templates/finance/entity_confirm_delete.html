{% extends "auth_tenants/base.html" %}
{% block title %}{{ page_title }}{% endblock %}
{% block page_title %}Finance · {{ page_title }}{% endblock %}
{% block content %}
<div class="w-full px-1 md:px-2">
  <div class="simple-card rounded-xl border border-border bg-card shadow-card p-6 max-w-xl">
    <h2 class="text-lg font-semibold text-foreground mb-2">{{ page_title }}</h2>
    <p class="text-sm text-muted-foreground mb-4">Delete: <strong class="text-foreground">{{ object }}</strong>?</p>
    <form method="post" class="flex gap-2">
      {% csrf_token %}
      <button type="submit" class="rounded-lg bg-destructive px-4 py-2 text-sm font-medium text-destructive-foreground hover:opacity-90">Delete</button>
      <a href="{% url list_url_name %}" class="rounded-lg border border-border px-4 py-2 text-sm font-medium text-foreground hover:bg-accent">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
